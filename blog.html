<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog | WINWINIT</title>
<meta name="description" content="Insights on WordPress, Shopify, WooCommerce, ecommerce and graphics design from the WINWINIT team.">
<link rel="icon" href="assets/images/logo.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=6">
</head>
<body>

<div id="site-header"></div>

<section class="page-hero">
  <div class="container">
    <span class="section-tag">Insights</span>
    <h1 style="font-size:42px;font-weight:800;color:var(--green);">Our <span style="color:var(--yellow);">Blog</span></h1>
    <p style="color:var(--text-secondary);max-width:520px;margin:12px auto 0;">Practical guides on WordPress, Shopify, WooCommerce, ecommerce and design.</p>
    <div class="breadcrumb"><a href="index.html">Home</a> / <span>Blog</span></div>
  </div>
</section>

<!-- ========== CATEGORIES + SORT (top controls) ========== -->
<section id="categories" style="padding-bottom:0;">
  <div class="container">
    <div class="section-header reveal">
      <span class="section-tag">Browse Topics</span>
      <h2>Categories</h2>
    </div>
    <div class="category-pills" id="category-pills"></div>

    <div style="display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:28px;">
      <label for="sort-select" style="font-size:14px;color:var(--text-secondary);font-weight:600;">Sort by</label>
      <select id="sort-select" style="padding:10px 14px;border-radius:10px;border:1px solid var(--border);font-family:inherit;font-size:14px;">
        <option value="date-desc">Newest First</option>
        <option value="date-asc">Oldest First</option>
        <option value="category">Category (A–Z)</option>
      </select>
    </div>
  </div>
</section>

<!-- ========== BLOG GRID ========== -->
<section id="latest">
  <div class="container">
    <div class="grid-3" id="blog-grid"></div>
  </div>
</section>

<!-- ========== NEWSLETTER ========== -->
<section>
  <div class="container">
    <div class="newsletter-box reveal">
      <div>
        <h3>Subscribe to our newsletter</h3>
        <p>Get the latest updates and insights delivered to your inbox.</p>
      </div>
      <form class="newsletter-form" id="newsletter-form">
        <input type="email" placeholder="Enter your email" required>
        <button type="submit" class="btn btn-primary">Subscribe</button>
      </form>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="assets/data/blog-posts.js?v=1"></script>
<script src="assets/js/partials.js?v=6"></script>
<script src="assets/js/script.js?v=6"></script>
<script>
(function () {
  var CATS = window.BLOG_CATEGORIES || {};
  var POSTS = window.BLOG_POSTS || [];
  var activeCat = 'all';
  var sortMode = 'date-desc';

  var pillsWrap = document.getElementById('category-pills');
  var grid = document.getElementById('blog-grid');
  var sortSelect = document.getElementById('sort-select');

  function countFor(key) {
    return key === 'all' ? POSTS.length : POSTS.filter(function (p) { return p.cat === key; }).length;
  }

  function renderPills() {
    var keys = ['all'].concat(Object.keys(CATS));
    pillsWrap.innerHTML = keys.map(function (key) {
      var label = key === 'all' ? 'All' : CATS[key].label;
      var active = key === activeCat ? ' active' : '';
      return '<a href="#" class="category-card reveal' + active + '" data-cat="' + key + '">' + label +
        '<span class="cat-count">' + countFor(key) + ' articles</span></a>';
    }).join('');

    pillsWrap.querySelectorAll('[data-cat]').forEach(function (el) {
      el.addEventListener('click', function (e) {
        e.preventDefault();
        activeCat = el.getAttribute('data-cat');
        renderPills();
        renderGrid();
      });
    });
  }

  function sortPosts(list) {
    var sorted = list.slice();
    if (sortMode === 'date-desc') sorted.sort(function (a, b) { return b.date.localeCompare(a.date); });
    else if (sortMode === 'date-asc') sorted.sort(function (a, b) { return a.date.localeCompare(b.date); });
    else if (sortMode === 'category') sorted.sort(function (a, b) { return CATS[a.cat].label.localeCompare(CATS[b.cat].label) || b.date.localeCompare(a.date); });
    return sorted;
  }

  function renderGrid() {
    var list = activeCat === 'all' ? POSTS : POSTS.filter(function (p) { return p.cat === activeCat; });
    list = sortPosts(list);

    grid.innerHTML = list.map(function (p) {
      var c = CATS[p.cat];
      return '<article class="blog-card reveal revealed">' +
        '<div class="blog-thumb" style="background:' + c.color + ';display:flex;align-items:center;justify-content:center;font-size:48px;">' + c.icon + '</div>' +
        '<div class="blog-card-body">' +
        '<span class="tag-pill">' + c.label + '</span>' +
        '<div class="blog-meta"><span>' + p.dateLabel + '</span><span>' + p.read + ' min read</span></div>' +
        '<h4>' + p.title + '</h4>' +
        '<p>' + p.excerpt + '</p>' +
        '<a href="blog/' + p.slug + '.html" class="read-more">Read More →</a>' +
        '</div></article>';
    }).join('');
  }

  sortSelect.addEventListener('change', function () {
    sortMode = sortSelect.value;
    renderGrid();
  });

  renderPills();
  renderGrid();
})();
</script>
</body>
</html>
